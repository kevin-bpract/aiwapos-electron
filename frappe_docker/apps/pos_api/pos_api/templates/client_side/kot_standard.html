<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>KOT</title>
<style>
  body { font-family: monospace; width: 80mm; margin: 0; padding: 6px; }
  hr { border: 0; border-top: 1px dashed #000; }
  .center { text-align: center; }
  .qty { font-size: 18px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { vertical-align: top; padding: 2px 0; }
</style>
</head>
<body>
<script>
  (function(){
    var d = window.RECEIPT_DATA || {};
    function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
    var rows = (d.items||[]).map(function(it){
      return '<tr><td class="qty"><b>' + (it.qty|0) + '×</b></td><td>' + esc(it.item_name) + (it.notes?'<br><small>'+esc(it.notes)+'</small>':'') + '</td></tr>';
    }).join('');
    document.body.innerHTML =
      '<div class="center"><h2 style="margin:0">KOT</h2><b>'+ esc((d.order_type||'DINING').toUpperCase()) +'</b></div>'+
      '<hr><div>Order: <b>'+esc(d.order_no)+'</b></div>'+
      '<div>Date: '+esc(d.order_date)+' '+esc(d.order_time||'')+'</div>'+
      (d.table_number?'<div class="qty">Table: <b>'+esc(d.table_number)+'</b></div>':'')+
      '<div>Cashier: '+esc(d.cashier)+'</div><hr>'+
      '<table><tbody>'+rows+'</tbody></table>'+
      (d.remarks?'<hr><div><b>Notes:</b> '+esc(d.remarks)+'</div>':'')+
      '<hr><div class="center"><small>Items: '+(d.total_items||0)+' · Qty: '+(d.total_qty||0)+'</small></div>';
  })();
</script>
</body>
</html>
